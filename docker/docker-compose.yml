services:
  vsgraphs_ros2:
    image: vsgraphs_ros2
    build:
      context: .
      dockerfile: Jazzy.Dockerfile
      ssh:
        - default
      args:
        USERNAME: $USERNAME
        USER_UID: 1000
        USER_GID: 1000
    container_name: vsgraphs_ros2
    environment:
      DISPLAY: $DISPLAY
      XAUTHORITY: $XAUTHORITY
      SSH_AUTH_SOCK: $SSH_AUTH_SOCK
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      TERM: $TERM
      SHELL: $SHELL
    runtime: nvidia
    privileged: true
    restart: always
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      # Display
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # - ~/.Xauthority:/home/user/.Xauthority:rw
      - $XAUTHORITY:$XAUTHORITY:rw
      # SSH
      - $SSH_AUTH_SOCK:$SSH_AUTH_SOCK
      # TMUX
      - ~/.tmux:/home/$USERNAME/.tmux:ro
      - ~/.tmux.conf:/home/$USERNAME/.tmux.conf:ro
      # Git
      - ~/.gitconfig:/home/$USERNAME/.gitconfig_local
      # Dev
      - /dev:/dev:rw
      # persistent bash history and config from local to container
      # - ~/.bash_history:/root/.bash_history
      # - container_home_cache:/root/.cache  # Optional: persist cache
      # Working Directory - vS-Graphs (** MODIFY **)
      - "/home/alitourani/ROS/workspace_vsgraphs/src/visual_sgraphs:/home/alitourani/workspace/src/visual_sgraphs:rw"
      # Working Directory - Scene Segmenter (** MODIFY **)
      - "/home/alitourani/ROS/workspace_segmenter/src/scene_segment_ros:/home/alitourani/workspace/src/scene_segment_ros:rw"
      # Working Directory - Situational Graphs Messages (** MODIFY **)
      - "/home/alitourani/ROS/workspace_vsgraphs/src/situational_graphs_msgs:/home/alitourani/workspace/src/situational_graphs_msgs:rw"
      # Working Directory - Graph Reasoning (** MODIFY **)
      - "/home/alitourani/ROS/workspace_vsgraphs/src/situational_graphs_reasoning:/home/alitourani/workspace/src/situational_graphs_reasoning:rw"
      # Working Directory - vS-Graphs Tools (** MODIFY **)
      - "/home/alitourani/ROS/vsgraphs_tools/Voxblox/relay_jazzy.py:/home/alitourani/workspace/vsgraphs_tools/relay_jazzy.py:rw"
      # Data Directory (** MODIFY **)
      - "/media/alitourani/AT_SSD/Datasets:/home/$USERNAME/datasets:rw"
    network_mode: "host"
    command:
      tail -f /dev/null
      # Used to set correct U/G(ID) for shared folder
    depends_on:
      - volume-init
  volume-init:
    image: busybox
    command: ["chown", "-R", "1000:1000", "/workspace/src/visual_sgraphs"]
    volumes:
      # Working Directory - vS-Graphs (** MODIFY **)
      - "/home/alitourani/ROS/workspace_vsgraphs/src/visual_sgraphs:/home/alitourani/workspace/src/visual_sgraphs:rw"
      # Working Directory - Scene Segmenter (** MODIFY **)
      - "/home/alitourani/ROS/workspace_segmenter/src/scene_segment_ros:/home/alitourani/workspace/src/scene_segment_ros:rw"
      # Working Directory - Situational Graphs Messages (** MODIFY **)
      - "/home/alitourani/ROS/workspace_vsgraphs/src/situational_graphs_msgs:/home/alitourani/workspace/src/situational_graphs_msgs:rw"
      # Working Directory - Graph Reasoning (** MODIFY **)
      - "/home/alitourani/ROS/workspace_vsgraphs/src/situational_graphs_reasoning:/home/alitourani/workspace/src/situational_graphs_reasoning:rw"
    entrypoint: ""
    restart: "no"
