services:
  snav:
    image: voxblox_ros2
    build:
      context: .
      dockerfile: Dockerfile
      ssh:
        - default
      args:
        USERNAME: $USERNAME
        USER_UID: 1000
        USER_GID: 1000
    container_name: voxblox_ros2
    environment:
      DISPLAY: $DISPLAY
      XAUTHORITY: $XAUTHORITY
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    runtime: nvidia
    privileged: true
    restart: always
    volumes:
      # display related
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # dev
      - /dev:/dev:rw
      # dev
      - ~/.Xauthority:/home/$USERNAME/.Xauthority:rw
      # working dirs
      - ./workspace:/home/$USERNAME/workspace:rw
    command: tail -f /dev/null
